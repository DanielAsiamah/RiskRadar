services:
  - type: web
    name: riskradar-api
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /ready
    maxShutdownDelaySeconds: 15
    disk:
      name: riskradar-data
      mountPath: /var/data/riskradar
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: WEB_APP_ENABLED
        value: true
      - key: WEB_DIST_DIR
        value: /app/dist
      - key: PORT
        value: 3001
      - key: RISKRADAR_DATA_DIR
        value: /var/data/riskradar
      - key: STATE_DRIVER
        value: json
      - key: SQLITE_BOOTSTRAP_FROM_JSON
        value: true
      - key: CORS_ALLOW_ORIGIN
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 180
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: UPSTREAM_TIMEOUT_MS
        value: 15000
      - key: UPSTREAM_RETRY_COUNT
        value: 1
      - key: MONTHLY_FETCH_CONCURRENCY
        value: 2
      - key: STALE_IF_ERROR_ENABLED
        value: true
      - key: PERSISTENT_CACHE_ENABLED
        value: true
      - key: ANALYSIS_SNAPSHOTS_ENABLED
        value: true
      - key: ANALYSIS_CACHE_ENABLED
        value: true
      - key: SEARCH_PRESETS_ENABLED
        value: true

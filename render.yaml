services:
  - type: web
    name: riskradar-api
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3001
      - key: CORS_ALLOW_ORIGIN
        sync: false
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 180
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: UPSTREAM_TIMEOUT_MS
        value: 15000
      - key: UPSTREAM_RETRY_COUNT
        value: 1
      - key: STALE_IF_ERROR_ENABLED
        value: true
      - key: PERSISTENT_CACHE_ENABLED
        value: true
      - key: ANALYSIS_SNAPSHOTS_ENABLED
        value: true
      - key: ANALYSIS_CACHE_ENABLED
        value: true
      - key: SEARCH_PRESETS_ENABLED
        value: true
